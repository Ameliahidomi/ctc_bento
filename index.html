<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>倉庫訂餐網</title>
<style>
:root{--page-width:900px;--bg:#fff4ea}
body{
  background:var(--bg);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
  color:#333;margin:0;display:flex;
  min-height:100vh;align-items:flex-start;
  justify-content:center;padding:40px 20px
}
.container{
  width:100%;max-width:var(--page-width);
  background:white;border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.07);
  padding:24px;box-sizing:border-box
}
h1{margin:0 0 12px;font-size:20px}
.row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
label{min-width:84px}
input,select{ padding:8px;border-radius:6px;border:1px solid #ddd }
button{
  padding:8px 12px;border-radius:8px;border:0;
  background:#ff8a4b;color:#fff;cursor:pointer;
  transition: transform 0.1s, filter 0.1s;
}
button:disabled{ background:#ccc !important; cursor:not-allowed; }
button.secondary{background:#ffb777;color:#000}
.center{display:flex;justify-content:center;gap:12px;margin:16px 0}
.menu-area{ border:1px dashed #ffd3b8; padding:12px;border-radius:8px;background:#fff7f0 }
.hidden{display:none}
.order-item{position:relative;padding:12px;padding-right:80px;border-bottom:1px solid #eee;margin-bottom:4px}
.order-item .delete-btn{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:#ff6b6b;color:#fff;border:0;
  border-radius:6px;padding:6px 12px;cursor:pointer
}
.small{font-size:13px;color:#555;margin-top:4px}
.note{font-size:12px;color:#777;margin-top:8px}

/* --- 公告視窗樣式 --- */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000;
}
.modal-content { 
  background: white; 
  padding: 30px 40px; 
  border-radius: 16px; 
  width: 540px; 
  max-width: 90%; 
  box-shadow: 0 12px 40px rgba(0,0,0,0.15); 
  position: relative;
  box-sizing: border-box;
  overflow: hidden;
}
.modal-header {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  z-index: 10;
}
.modal-body { 
  text-align: left; 
  line-height: 1.8; 
  font-size: 16px;
  color: #333;
  margin-bottom: 25px;
  position: relative;
  z-index: 10;
}
.modal-body div { margin-bottom: 8px; }

.notice-bg-img {
  position: absolute;
  right: 10px;
  bottom: 10px;
  width: 180px; 
  z-index: 5;
  pointer-events: none;
}

.modal-footer {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

#closeNotice {
  padding: 10px 30px;
  font-size: 16px;
  font-weight: bold;
  background: #ff8a4b;
  border-radius: 10px;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}
</style>
</head>
<body>

<div id="noticeModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <span>📢</span> 訂餐注意事項
    </div>
    <div class="modal-body">
      <div>1. 每日訂餐截止時間請參考群組公告。</div>
      <div>2. 某些餐廳會有特殊餐點選擇，如有出現欄位請務必選擇。</div>
      <div>3. 若餐點有特殊過敏原請務必在備註註明。</div>
      <div>4. 下單後請確認即時清單內容是否正確。</div>
      <div>5. 如訂餐系統有任何疑問請即時反應給團主修正。</div>
    </div>
    
    <img src="https://raw.githubusercontent.com/Ameliahidomi/ctcbento/main/Emoji.png" class="notice-bg-img" alt="Thank you">
    
    <div class="modal-footer">
      <button id="closeNotice">我了解了</button>
    </div>
  </div>
</div>

<div class="container">
  <h1>倉庫訂餐網</h1>

  <div id="page-login" class="hidden">
    <div class="row"><label>🆔 員工工號</label><input id="empId" type="text" placeholder="輸入工號" /></div>
    <div class="center"><button id="btnLogin">登入</button></div>
  </div>
  <div id="page-home" class="hidden">
    <p id="welcome" style="font-weight:bold; font-size:18px"></p>
    <div class="center"><button id="toLunch">🍱 午餐</button><button id="toTea" class="secondary hidden">☕ 下午茶</button></div>
  </div>
  <div id="page-lunch" class="hidden">
    <div class="row"><label>🏪 餐廳名稱</label><select id="restaurant"></select></div>
    <div class="menu-area">
      <div class="row">
        <label>🍲 餐點選擇</label>
        <select id="menuItem"></select>
        <input id="customItem" class="hidden" placeholder="請手動輸入餐點名稱" style="width:250px" />
      </div>
      <div class="row hidden" id="priceRow">
        <label>💰 單價 (元)</label>
        <input id="customPrice" type="number" placeholder="金額" style="width:100px" />
      </div>
      <div id="additionalRow" class="row hidden"><label id="additionalLabel">⚙️ 選項</label><div id="potMainContainer"></div></div>
      <div id="friesRow" class="row hidden"><label>🍟 加購薯條</label><select id="addFries"><option value="">不加購</option><option value="加購薯條+$30">加購薯條+$30</option></select></div>
      <div class="row"><label>🧂 調味</label><select id="spice"><option>不加</option><option>微辣</option><option>小辣</option><option>中辣</option><option>加醋</option></select></div>
      <div class="row"><label>🔢 數量</label><input id="qty" type="number" min="1" value="1" style="width:80px"></div>
      <div class="row"><label>📝 備註</label><input id="note" placeholder="例: 少醬、不要蔥...."></div>
      <div class="center"><button id="addLunch">➕ 新增訂單</button><button id="backFromLunch" class="secondary">⬅️ 回上一頁</button></div>
    </div>
  </div>
  <div class="orders">
    <h3>📋我的訂單（即時顯示）</h3>
    <div id="ordersList"></div>
    <p class="note">僅顯示你本人的訂單，可隨時刪除。</p>
  </div>
</div>

<script>
const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyznRRA7TJ28X9TtMU_0r2qhXUemySqgICb6kI-Jd2YA0zzhJxEK6OQr1JOkyL7YtXK/exec";

// 將一般餐廳與多重分類的圓DoDo整合
const potMainConfigs = {
  "老江紅茶": { categoryKey: "套餐組合", options: ["紅茶冰-$81", "冷泡茶-$81", "小杯奶茶-$89", "中杯奶茶-$106"], label: "🥤 套餐飲料", hasFries: true },
  "老李小火鍋": { categoryKey: "鍋物湯底", options: ["白飯", "意麵", "科學麵", "冬粉", "蒸煮麵", "王子麵"], label: "🍜 主食選擇" },
  "北平京廚": { categoryKey: "麵食類", options: ["刀削麵", "細麵"], label: "🍜 麵體選擇" },
  "小琉球菜尾": { itemKey: "蛋炒飯", options: ["不要蒜", "不要蔥", "不要洋蔥", "不要胡椒"], label: "🚫 客製需求", isMulti: true },
  "有春鍋燒": { categoryKey: "鍋燒系列", options: ["意麵", "蒸煮麵", "雞絲麵", "冬粉", "白飯", "讚岐烏龍+$10"], label: "🍜 主食選擇" },
  "北方園牛肉拉麵": { categoryKey: "麵類", options: ["拉麵", "細麵", "刀削麵", "冬粉"], label: "🍜 主食選擇" },
  "灶蹄蹤堂": { categoryKey: "便當類", options: ["正常飯", "正常飯+滷汁", "半飯", "半飯+滷汁", "不飯換菜"], label: "🍜 主食選擇" },
  "五花馬水餃館": { categoryKey: "麵食類", options: ["白麵", "蔬菜麵"], label: "🍜 主食選擇" },
  "吃得巧海苔飯捲": { categoryKey: "口味", options: ["正常", "換拾穀+$10", "加菜+$10", "加飯+$15", "加肉+$15"], label: "🍜 份量加購" },
  "水粉嬤便當": { categoryKey: "便當系列", options: ["正常", "半飯", "不飯"], label: "🍜 主食選擇" },
  "鼎新刈包": { categoryKey: "精選刈包", options: ["原味", "薑黃", "全麥", "黑糖"], label: "🌮 刈包選擇", img: "https://raw.githubusercontent.com/Ameliahidomi/ctc_bento/main/Guabao.jpg" },
  "豆坊": { img: "https://raw.githubusercontent.com/Ameliahidomi/ctc_bento/main/Doufun.jpg" },
  "江鳥紅": { categoryKey: "鍋燒系列", options: ["冬粉", "飯", "意麵+$10", "拉麵+$10"], label: "🍜 主食選擇" },
  "三色麵疙瘩": { categoryKey: "湯底", options: ["麵疙瘩", "意麵", "雞絲", "冬粉", "泡飯", "蒸煮麵", "王子麵"], label: "🍜 主食選擇" },
  "呷飽飽創意鍋燒": { categoryKey: "鍋燒湯底", options: ["意麵", "雞絲", "烏龍", "冬粉", "飯", "蒸煮麵", "蛋黃麵"], label: "🍜 主食選擇" },
  
  // 將某餐廳合併為單一Key，並改用陣列結構支援多種分類
  "囍廣港式燒臘": [
    { itemKey: "雙拼便當", options: ["燒鴨", "油雞", "香腸", "叉燒", "脆皮豬"], label: "🍜主食五選二" },
    { categoryKey: "港式蛋炒飯", options: ["不加", "豬肉", "蝦仁", "牛肉"], label: "🍜 加料+20" }
  ]
};

// 多張菜單配置
const specialRestaurantImages = {
  "囍廣港式燒臘": [
    "https://raw.githubusercontent.com/Ameliahidomi/ctcbento/main/dsorder01.jpg",
    "https://raw.githubusercontent.com/Ameliahidomi/ctcbento/main/dsorder02.jpg"
  ],
  "江鳥紅": [
     "https://raw.githubusercontent.com/Ameliahidomi/ctcbento/main/jiangniaohong.jpg"
  ]
};

let CURRENT_USER = null; let MENUS = {}; let lastShownRestaurant = ""; 
const el = id => document.getElementById(id);

el("closeNotice").onclick = () => { el("noticeModal").style.display = "none"; el("page-login").classList.remove("hidden"); };

el("btnLogin").onclick = async () => {
  const empId = el("empId").value.trim(); if (!empId) return;
  el("btnLogin").disabled = true;
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getEmployees`);
    const data = await res.json();
    const found = data.find(e => String(e.id) === empId);
    if (found) { 
      CURRENT_USER = found; 
      el("page-login").classList.add("hidden"); 
      el("page-home").classList.remove("hidden"); 
      el("welcome").textContent = `歡迎 ${found.name}`; 
      renderOrders(); 
    }
    else { alert("工號錯誤"); el("btnLogin").disabled = false; }
  } catch (e) { alert("系統錯誤"); el("btnLogin").disabled = false; }
};

async function loadMenus(mode) {
  const sel = el("restaurant");
  sel.innerHTML = "<option disabled selected>🔄 菜單更新中，請稍候...</option>";
  el("menuItem").innerHTML = "";
  
  const actionName = (mode === "tea") ? "getTeaMenus" : "getMenus";
  
  try {
    const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=${actionName}`);
    MENUS = await res.json();
    sel.innerHTML = "";
    
    Object.keys(MENUS).forEach(r => { 
      const opt = document.createElement("option"); 
      opt.value = r; 
      opt.textContent = r; 
      sel.appendChild(opt); 
    });
    
    if (sel.options.length > 0) {
      populateMenu(sel.value);
    }
  } catch (e) {
    sel.innerHTML = "<option disabled>❌ 載入失敗，請重新切換試試</option>";
  }
}

function populateMenu(restaurant) {
  const sel = el("menuItem"); sel.innerHTML = "";
  const items = MENUS[restaurant] || [];
  let lastCat = null;
  items.forEach(it => {
    if (it.cat !== lastCat) {
      const catOpt = document.createElement("option"); catOpt.disabled = true;
      catOpt.textContent = `-${it.cat}-`; catOpt.style.fontWeight = "bold"; sel.appendChild(catOpt); lastCat = it.cat;
    }
    const option = document.createElement("option"); option.value = JSON.stringify(it);
    option.textContent = `${it.name} — ${it.price}元`; sel.appendChild(option);
  });
  handleDynamicUI();
}

function handleDynamicUI() {
  const restaurant = el("restaurant").value; 
  const itemVal = el("menuItem").value;
  const container = el("potMainContainer");
  
  container.innerHTML = ""; 
  el("additionalRow").classList.add("hidden"); 
  el("friesRow").classList.add("hidden");

  // 💡 修正：切換餐廳時，若有多張菜單，全部打包在同一個新分頁中，可往下捲動瀏覽
  if (restaurant !== lastShownRestaurant) {
    const specialImages = specialRestaurantImages[Object.keys(specialRestaurantImages).find(k => restaurant.includes(k))];
    if (specialImages && specialImages.length > 0) {
      // 串接所有圖片標籤
      const imgTags = specialImages.map(url => `<img src="${url}" style="max-width:100%; display:block; margin:0 auto 20px auto; box-shadow:0 4px 10px rgba(0,0,0,0.15); border-radius:8px;">`).join('');
      
      // 組合新分頁 HTML
      const pageContent = `
        <html>
        <head>
          <title>${restaurant} 菜單瀏覽</title>
          <style>
            body { background: #fff4ea; margin: 0; padding: 30px 15px; font-family: sans-serif; text-align: center; }
            .container { max-width: 800px; margin: 0 auto; }
            h2 { color: #333; margin-bottom: 25px; font-size: 22px; }
            .tip { color: #666; font-size: 14px; margin-bottom: 20px; }
          </style>
        </head>
        <body>
          <div class="container">
            <h2>📋 ${restaurant} — 菜單內容</h2>
            <p class="tip">💡 提示：可往下滑動查看完整菜單</p>
            ${imgTags}
          </div>
        </body>
        </html>
      `;
      
      // 開啟單一空白分頁並寫入 HTML
      const menuWindow = window.open();
      if (menuWindow) {
        menuWindow.document.write(pageContent);
        menuWindow.document.close();
      }
    }
    lastShownRestaurant = restaurant;
  }

  // 萬客臨與豆坊：切換為手動自行輸入
  if (restaurant.includes("萬客臨彩色麵疙瘩") || restaurant.includes("豆坊")) {
    el("menuItem").classList.add("hidden");       
    el("customItem").classList.remove("hidden");    
    el("priceRow").classList.remove("hidden");      
    
    if (restaurant.includes("豆坊")) {
      const config = potMainConfigs["豆坊"];
      if (config && config.img) {
        window.open(config.img, '_blank');
      }
    }
    return; 
  } else {
    el("menuItem").classList.remove("hidden");
    el("customItem").classList.add("hidden");
    el("priceRow").classList.add("hidden");
  }

  if (!itemVal || itemVal.startsWith("🔄")) return; 
  const itemObj = JSON.parse(itemVal);
  
  const configKey = Object.keys(potMainConfigs).find(k => restaurant.includes(k));
  let configData = potMainConfigs[configKey];

  if (!configData) return;

  // 其他一般配圖餐廳，同樣改為新分頁開啟
  if (configData.img && !Array.isArray(configData)) {
    window.open(configData.img, '_blank');
  }

  const cleanCat = (itemObj.cat || "").replace(/\s+/g, '');
  let targetConfig = null;

// 如果設定是陣列，支援透過 itemKey (餐點名) 或 categoryKey (分類) 進行精準/模糊篩選
  if (Array.isArray(configData)) {
    targetConfig = configData.find(cfg => {
      if (cfg.itemKey && itemObj.name.includes(cfg.itemKey)) return true;
      if (cfg.categoryKey && cleanCat.includes(cfg.categoryKey)) return true;
      return false;
    });
  } else {
    // 一般單一設定的餐廳
    const match = (configData.categoryKey && cleanCat.includes(configData.categoryKey)) || 
                  (configData.itemKey && itemObj.name.includes(configData.itemKey));
    if (match) targetConfig = configData;
  }

  // 如果找到對應的欄位設定，將其渲染至畫面上
  if (targetConfig) {
    el("additionalLabel").textContent = targetConfig.label;
    if (targetConfig.isMulti) { 
      container.innerHTML = targetConfig.options.map(o => `<label style="margin-right:8px"><input type="checkbox" name="customOption" value="${o}"> ${o}</label>`).join(''); 
    } else { 
      container.innerHTML = `<select id="potMain">${targetConfig.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`; 
    }
    el("additionalRow").classList.remove("hidden");
    if (targetConfig.hasFries) el("friesRow").classList.remove("hidden");
  }
}

function resetFormInputs() {
  el("customItem").value = "";
  el("customPrice").value = "";
  el("qty").value = "1";
  el("note").value = "";
  el("spice").selectedIndex = 0;
  el("addFries").value = "";
}

el("addLunch").onclick = async () => {
  const restaurant = el("restaurant").value;
  if(restaurant.startsWith("🔄")) return; 
  
  let itemObj = { cat: "手動輸入", name: "", price: 0 };
  const isCustomInput = restaurant.includes("萬客臨彩色麵疙瘩") || restaurant.includes("豆坊");
  
  if (isCustomInput) {
    const customName = el("customItem").value.trim();
    const customPrice = el("customPrice").value.trim();
    if (!customName || !customPrice) {
      alert("請輸入餐點名稱與金額！");
      return;
    }
    itemObj.name = customName;
    itemObj.price = customPrice;
  } else {
    itemObj = JSON.parse(el("menuItem").value);
  }

  el("addLunch").disabled = true;
  const checkboxes = document.querySelectorAll('input[name="customOption"]:checked');
  let potMainVal = checkboxes.length ? Array.from(checkboxes).map(cb => cb.value).join(', ') : (el("potMain") ? el("potMain").value : "");
  
  await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: new URLSearchParams({
    action: "add", date: new Date().toISOString().split('T')[0], employee: CURRENT_USER.name, 
    restaurant: restaurant, category: itemObj.cat, item: itemObj.name, 
    price: itemObj.price, spice: el("spice").value, qty: el("qty").value, note: el("note").value, potMain: potMainVal
  })});
  
  alert("訂單已新增"); 
  resetFormInputs();
  renderOrders(); 
  el("addLunch").disabled = false;
};

async function renderOrders() {
  const res = await fetch(`${GOOGLE_WEBAPP_URL}?action=getOrders&employee=${encodeURIComponent(CURRENT_USER.name)}`);
  const data = await res.json();
  el("ordersList").innerHTML = data.map((o, idx) => {
    let formattedDate = "";
    if (o.date) {
      const d = new Date(o.date);
      if (!isNaN(d.getTime())) {
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        formattedDate = `${mm}/${dd}`;
      } else {
        formattedDate = o.date; 
      }
    }
    
    return `
    <div class="order-item">
      <div><strong>#${idx+1} ${formattedDate ? formattedDate + ' ' : ''}${o.restaurant} - ${o.item}</strong></div>
      <div class="small">
        分類: ${o.category || "未分類"} | 
        日期: ${o.date ? o.date.split('T')[0] : "無"} | 
        數量: ${o.qty || 1} | 
        價格: ${o.price || 0} 元 | 
        調味: ${o.spice || "不加"}
        ${o.potMain ? ' | 選項: ' + o.potMain : ''}
      </div>
      ${o.note ? `<div class="small" style="color:#888;">備註: ${o.note}</div>` : ''}
      <button class="delete-btn" onclick="deleteOrder('${o.id}')">🗑️ 刪除</button>
    </div>`;
  }).join('');
}

async function deleteOrder(id) {
  if (!confirm("確定刪除？")) return;
  await fetch(GOOGLE_WEBAPP_URL, { method: "POST", body: new URLSearchParams({action:"delete", id, employee: CURRENT_USER.name}) });
  renderOrders();
}

el("restaurant").onchange = () => { lastShownRestaurant = ""; populateMenu(el("restaurant").value); };
el("menuItem").onchange = handleDynamicUI;

el("toLunch").onclick = () => { 
  el("page-home").classList.add("hidden"); 
  el("page-lunch").classList.remove("hidden"); 
  lastShownRestaurant = "";
  resetFormInputs();
  loadMenus("lunch"); 
};

el("toTea").onclick = () => { 
  el("page-home").classList.add("hidden"); 
  el("page-lunch").classList.remove("hidden"); 
  lastShownRestaurant = "";
  resetFormInputs();
  loadMenus("tea"); 
};
